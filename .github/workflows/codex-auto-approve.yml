name: Codex auto-approve (guarded)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  codex_auto_approve:
    # Guardrails: only run for non-fork PRs, and not for drafts
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: CI_CD_PIPELINE

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (tag v5)
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          # Optional but often helps: ensures history exists locally
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Materialize protected prompt/schema from master branch head
        run: |
          set -euo pipefail
          mkdir -p .codex-protected

          git fetch --no-tags origin master:refs/remotes/origin/master --depth=1

          git show origin/master:.github/codex/prompts/pr-approval.md \
            > .codex-protected/pr-approval.md

          git show origin/master:.github/codex/schemas/pr-approval.schema.json \
            > .codex-protected/pr-approval.schema.json

          git show origin/master:.github/codex/allowlists/auto-approve.json \
            > .codex-protected/auto-approve.json

      - name: Load allowlist from protected base commit
        id: allow
        run: |
          author="${{ github.event.pull_request.user.login }}"
          if jq -e --arg a "$author" 'index($a) != null' .codex-protected/auto-approve.json > /dev/null; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build protected run prompt with PR diff
        run: |
          set -euo pipefail
          mkdir -p .codex-run

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PR_TITLE_JSON='${{ toJson(github.event.pull_request.title) }}'
          PR_BODY_JSON='${{ toJson(github.event.pull_request.body) }}'

          PR_TITLE="$(printf '%s' "$PR_TITLE_JSON" | jq -r '.')"
          PR_BODY="$(printf '%s' "$PR_BODY_JSON" | jq -r '. // ""')"

          {
            # 1) Protected instructions (from master)
            cat .codex-protected/pr-approval.md

            echo ""
            echo "## PR context (generated by workflow)"
            echo "Repo: ${{ github.repository }}"
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "Base: ${{ github.event.pull_request.base.ref }} @ ${BASE_SHA}"
            echo "Head: ${{ github.event.pull_request.head.ref }} @ ${HEAD_SHA}"
            echo ""
            echo "## PR title"
            echo "<<<BEGIN_PR_TITLE>>>"
            printf '%s\n' "$PR_TITLE"
            echo "<<<END_PR_TITLE>>>"
            echo ""
            echo "## PR description"
            echo "<<<BEGIN_PR_DESCRIPTION>>>"
            printf '%s\n' "$PR_BODY"
            echo "<<<END_PR_DESCRIPTION>>>"
            echo ""
            echo "## Changed files"
            echo "<<<BEGIN_CHANGED_FILES>>>"
            git --no-pager diff --name-status "${BASE_SHA}...${HEAD_SHA}" || true
            echo "<<<END_CHANGED_FILES>>>"
            echo ""
            echo "## Unified diff"
            echo "<<<BEGIN_DIFF>>>"
            git --no-pager diff --unified=5 "${BASE_SHA}...${HEAD_SHA}" || true
            echo "<<<END_DIFF>>>"
          } > .codex-run/prompt.md

      - name: Run Codex (structured decision using protected prompt)
        id: run_codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # v1.4 (tag v1)
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-run/prompt.md
          output-schema-file: .codex-protected/pr-approval.schema.json
          output-file: codex-review.json
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Parse decision
        id: parse
        run: |
          echo "decision=$(jq -r .decision codex-review.json)" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          jq -r .summary codex-review.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "blocking_issues=$(jq -c .blocking_issues codex-review.json)" >> "$GITHUB_OUTPUT"

      - name: Approve PR if Codex says APPROVE and author is trusted
        if: steps.parse.outputs.decision == 'APPROVE' && steps.allow.outputs.trusted == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0 (tag v7)
        env:
          SUMMARY: ${{ steps.parse.outputs.summary }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: "APPROVE",
              body: process.env.SUMMARY || "Codex: approved.",
              commit_id: context.payload.pull_request.head.sha,
            });

      - name: Request changes if Codex says REQUEST_CHANGES
        if: steps.parse.outputs.decision == 'REQUEST_CHANGES'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0 (tag v7)
        env:
          SUMMARY: ${{ steps.parse.outputs.summary }}
          BLOCKING_ISSUES_JSON: ${{ steps.parse.outputs.blocking_issues }}
        with:
          github-token: ${{ github.token }}
          script: |
            const blockingIssues = JSON.parse(process.env.BLOCKING_ISSUES_JSON || '[]');
            const summary = process.env.SUMMARY || "Codex requested changes.";
            const issuesBody = blockingIssues.length
              ? blockingIssues.map((issue) => `- ${issue}`).join("\n")
              : "- No blocking issues were returned.";

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: "REQUEST_CHANGES",
              body: `${summary}\n\n### Blocking issues\n${issuesBody}`,
              commit_id: context.payload.pull_request.head.sha,
            });
